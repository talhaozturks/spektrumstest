<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spektrum Siyasal Bilimler Sempozyumu</title>
    
    <!-- Tailwind CSS (Tarayıcı içi derleyici) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Koyu Mod Ayarı -->
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <!-- FontAwesome İkonları -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React ve ReactDOM kütüphaneleri -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Tarayıcıda JSX'i çevirmek için) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* CSS Değişkenleri ve Özel Animasyonlar */
        :root {
            --grid-color: #e5e7eb;
        }
        .dark {
            --grid-color: #1e293b;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-modal-pop {
            animation: modalPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        /* Tema Değişimine Duyarlı Grid Arkaplan */
        .bg-grid-pattern {
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: -1px -1px;
            transition: background-image 0.5s ease-in-out;
        }
    </style>
</head>
<body class="transition-colors duration-500 bg-[#fafafa] dark:bg-[#0f172a]">
    <!-- React uygulamasının yükleneceği ana div -->
    <div id="root"></div>

    <!-- Uygulama Kodları (Babel ile derlenir) -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // %100 Vektörel (SVG) Mükemmel Çizilmiş Spektrum Logosu
        const SpektrumSVG = ({ className }) => {
            // Sol defne yapraklarının matematiksel konumları (Açı ve Boyut)
            const leftLeaves = [
                {x: 125, y: 285, ao: -90, ai: -40, s: 0.6},
                {x: 100, y: 265, ao: -80, ai: -30, s: 0.75},
                {x: 78, y: 240, ao: -70, ai: -20, s: 0.85},
                {x: 62, y: 210, ao: -60, ai: -10, s: 0.95},
                {x: 52, y: 175, ao: -50, ai: 0, s: 1.0},
                {x: 50, y: 140, ao: -40, ai: 15, s: 0.95},
                {x: 58, y: 105, ao: -30, ai: 25, s: 0.9},
                {x: 72, y: 75, ao: -20, ai: 35, s: 0.8},
                {x: 95, y: 50, ao: -10, ai: 45, s: 0.7},
                {x: 125, y: 32, ao: 10, ai: 60, s: 0.55},
            ];

            return (
                <svg viewBox="0 0 400 350" className={className} xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        {/* Renk Geçişleri (Gradients) - Orijinal görseldeki o derinliği vermek için */}
                        <linearGradient id="navyGrad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor="#25446c" />
                            <stop offset="100%" stopColor="#0e1f38" />
                        </linearGradient>
                        <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor="#a3b1c6" />
                            <stop offset="100%" stopColor="#637385" />
                        </linearGradient>
                        <linearGradient id="leafGradRight" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor="#8c9cb0" />
                            <stop offset="100%" stopColor="#556475" />
                        </linearGradient>
                    </defs>

                    {/* YAPRAK DALLARI (STEMS) */}
                    <path d="M 150,300 C 60,290 20,160 125,32" fill="none" stroke="url(#leafGrad)" strokeWidth="2.5" strokeLinecap="round" />
                    <path d="M 250,300 C 340,290 380,160 275,32" fill="none" stroke="url(#leafGradRight)" strokeWidth="2.5" strokeLinecap="round" />

                    {/* DEFNE YAPRAKLARI */}
                    <g id="left-leaves">
                        {leftLeaves.map((pos, i) => (
                            <g key={`left-${i}`}>
                                {/* Dış Yaprak */}
                                <path d="M 0,0 C -8,-15 -8,-25 0,-35 C 8,-25 8,-15 0,0 Z" transform={`translate(${pos.x}, ${pos.y}) rotate(${pos.ao}) scale(${pos.s})`} fill="url(#leafGrad)" />
                                {/* İç Yaprak */}
                                <path d="M 0,0 C -8,-15 -8,-25 0,-35 C 8,-25 8,-15 0,0 Z" transform={`translate(${pos.x}, ${pos.y}) rotate(${pos.ai}) scale(${pos.s})`} fill="url(#leafGrad)" />
                            </g>
                        ))}
                    </g>
                    <g id="right-leaves">
                        {leftLeaves.map((pos, i) => (
                            <g key={`right-${i}`}>
                                {/* Dış Yaprak (Simetrik) */}
                                <path d="M 0,0 C -8,-15 -8,-25 0,-35 C 8,-25 8,-15 0,0 Z" transform={`translate(${400 - pos.x}, ${pos.y}) rotate(${-pos.ao}) scale(${pos.s})`} fill="url(#leafGradRight)" />
                                {/* İç Yaprak (Simetrik) */}
                                <path d="M 0,0 C -8,-15 -8,-25 0,-35 C 8,-25 8,-15 0,0 Z" transform={`translate(${400 - pos.x}, ${pos.y}) rotate(${-pos.ai}) scale(${pos.s})`} fill="url(#leafGradRight)" />
                            </g>
                        ))}
                    </g>

                    {/* İYONİK SÜTUN (PILLAR) */}
                    {/* Sütun Şapkası (Capital) */}
                    <rect x="155" y="80" width="90" height="6" fill="url(#navyGrad)" />
                    <rect x="165" y="88" width="70" height="8" fill="url(#navyGrad)" />
                    {/* İyonik Kıvrımlar (Volutes) */}
                    <path d="M 175,94 C 135,94 135,124 160,124 C 175,124 175,106 160,106" fill="none" stroke="url(#navyGrad)" strokeWidth="5.5" strokeLinecap="round" />
                    <path d="M 225,94 C 265,94 265,124 240,124 C 225,124 225,106 240,106" fill="none" stroke="url(#navyGrad)" strokeWidth="5.5" strokeLinecap="round" />
                    <rect x="170" y="100" width="60" height="4" fill="url(#navyGrad)" />
                    {/* Dikey Sütun Çizgileri */}
                    <rect x="172" y="104" width="10" height="140" fill="url(#navyGrad)" />
                    <rect x="186.6" y="104" width="10" height="140" fill="url(#navyGrad)" />
                    <rect x="201.3" y="104" width="10" height="140" fill="url(#navyGrad)" />
                    <rect x="216" y="104" width="10" height="140" fill="url(#navyGrad)" />

                    {/* EN ALTTAKİ KAVİSLİ ÇİZGİ (SWOOSH) */}
                    <path d="M 70,320 Q 200,290 330,320 Q 200,310 70,320 Z" fill="url(#navyGrad)" />

                    {/* KİTAP (THE BOOK) */}
                    {/* Kitap Arka Kapağı ve Ortadaki Sırt Kısmı */}
                    <path d="M 95,225 Q 145,240 200,248 Q 255,240 305,225 L 305,285 Q 255,302 200,310 Q 145,302 95,285 Z" fill="url(#navyGrad)" />
                    
                    {/* Sol Sayfalar */}
                    <path d="M 102,222 Q 148,236 195,242 L 195,304 Q 148,296 102,280 Z" fill="#ffffff" />
                    <path d="M 110,215 Q 150,230 195,236 L 195,298 Q 150,290 110,274 Z" fill="url(#navyGrad)" />
                    {/* Sol Sayfa Çizgileri */}
                    <path d="M 110,225 Q 150,240 195,246" fill="none" stroke="#ffffff" strokeWidth="2.5" />
                    <path d="M 110,241 Q 150,256 195,262" fill="none" stroke="#ffffff" strokeWidth="2.5" />
                    <path d="M 110,257 Q 150,272 195,278" fill="none" stroke="#ffffff" strokeWidth="2.5" />

                    {/* Sağ Sayfalar */}
                    <path d="M 298,222 Q 252,236 205,242 L 205,304 Q 252,296 298,280 Z" fill="#ffffff" />
                    <path d="M 290,215 Q 250,230 205,236 L 205,298 Q 250,290 290,274 Z" fill="url(#navyGrad)" />
                    {/* Sağ Sayfa Çizgileri */}
                    <path d="M 290,225 Q 250,240 205,246" fill="none" stroke="#ffffff" strokeWidth="2.5" />
                    <path d="M 290,241 Q 250,256 205,262" fill="none" stroke="#ffffff" strokeWidth="2.5" />
                    <path d="M 290,257 Q 250,272 205,278" fill="none" stroke="#ffffff" strokeWidth="2.5" />
                </svg>
            );
        };

        function App() {
            const [isLoading, setIsLoading] = useState(true);
            const [progress, setProgress] = useState(0);
            const [textIndex, setTextIndex] = useState(0);
            const [showTeam, setShowTeam] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            // Tanıtım videosu modal (pencere) state'i
            const [showIntroVideo, setShowIntroVideo] = useState(true);
            
            // Koyu Mod State'i
            const [isDarkMode, setIsDarkMode] = useState(false);

            // Koyu Modu HTML'e uygulama (body'e dark class'ı ekler)
            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDarkMode]);

            const loadingTexts = [
                "En iyi deneyim için tercihiniz.",
                "Site yükleniyor...",
                ":P"
            ];

            // Yükleme Animasyonları
            useEffect(() => {
                if (!isLoading) return;
                const progressInterval = setInterval(() => {
                    setProgress((prev) => {
                        if (prev >= 100) {
                            clearInterval(progressInterval);
                            setTimeout(() => setIsLoading(false), 200); // Ekranın hemen kapanması için bekleme süresi azaltıldı
                            return 100;
                        }
                        // Tam olarak 1.5 saniye sürmesi için matematiksel ayar (30ms * 50 adım = 1500ms)
                        return Math.min(prev + 2, 100);
                    }, 30);
                }, []);

                const textInterval = setInterval(() => {
                    setTextIndex((prev) => (prev + 1) % loadingTexts.length);
                }, 1200);

                return () => {
                    clearInterval(progressInterval);
                    clearInterval(textInterval);
                };
            }, [isLoading]);

            if (isLoading) {
                return (
                    <div className="fixed inset-0 flex flex-col items-center justify-center bg-[#fafafa] dark:bg-[#0f172a] font-sans selection:bg-[#162a45] selection:text-white transition-colors duration-500 z-[200] overflow-hidden">
                        
                        {/* SAĞDAKİ GÖRSEL VE KONUŞMA BALONCUĞU */}
                        <div className="absolute bottom-0 right-0 md:right-10 flex flex-col items-end animate-fade-in-up z-10" style={{ animationDelay: '0.1s' }}>
                            {/* Konuşma Baloncuğu */}
                            <div className="relative bg-white dark:bg-[#1e293b] border-2 border-[#162a45] dark:border-[#8c9eb1] p-3 md:p-4 rounded-2xl shadow-[4px_4px_0px_#162a45] dark:shadow-[4px_4px_0px_#8c9eb1] mb-2 mr-6 md:mr-10 transform -rotate-2 hover:rotate-0 transition-transform">
                                <p className="text-[#162a45] dark:text-[#f8fafc] font-bold text-sm md:text-base whitespace-nowrap">"En iyi Sempozyum!"</p>
                                <p className="text-xs md:text-sm text-[#8c9eb1] font-mono text-right mt-1">- Işıl IŞIKLI</p>
                                {/* Baloncuk Kuyruğu */}
                                <div className="absolute -bottom-[9px] right-8 w-4 h-4 bg-white dark:bg-[#1e293b] border-b-2 border-r-2 border-[#162a45] dark:border-[#8c9eb1] transform rotate-45"></div>
                            </div>
                            
                            {/* Işıl Işıklı Görseli */}
                            <img 
                                src="https://cdn.discordapp.com/attachments/1180884362401689702/1505636087391846520/aaisil-S9zZFaal.png?ex=6a0b5860&is=6a0a06e0&hm=34178798e3b57d0bba9c1175a932b9bed4b3b49c9b035466877d6ddf1181854a&" 
                                alt="Işıl Işıklı"
                                className="w-40 h-40 md:w-64 md:h-64 object-contain object-bottom drop-shadow-xl"
                            />
                        </div>

                        <div className="mb-10 flex flex-col items-center transform transition-transform duration-1000 hover:scale-105 relative z-20">
                            
                            {/* Eski image tag'i yerine BİREBİR AYNI çizilmiş Vektörel SVG Logo */}
                            <SpektrumSVG className="w-40 h-40 md:w-56 md:h-56 drop-shadow-sm" />
                            
                            <h1 className="text-3xl md:text-5xl font-serif tracking-widest text-[#162a45] dark:text-[#f8fafc] mt-4 transition-colors duration-500" style={{ fontFamily: 'Georgia, serif' }}>
                                SPEKTRUM
                            </h1>
                        </div>
                        <div className="w-64 md:w-80 h-3 border-2 border-[#162a45] dark:border-[#8c9eb1] bg-white dark:bg-[#1e293b] p-0.5 relative overflow-hidden transition-colors duration-500 z-20">
                            <div className="h-full bg-[#162a45] dark:bg-[#8c9eb1] transition-all duration-100 ease-out" style={{ width: `${progress}%` }}></div>
                        </div>
                        <div className="h-8 mt-4 overflow-hidden flex items-center justify-center z-20">
                            <p key={textIndex} className="text-[#162a45] dark:text-[#f8fafc] text-sm md:text-base font-medium animate-fade-in-up transition-colors duration-500">
                                {loadingTexts[textIndex]}
                            </p>
                        </div>
                    </div>
                );
            }

            // Komisyon Verileri
            const committees = [
                { id: "01", title: "Siyasal Ekonomi", icon: "fa-solid fa-scale-balanced", desc: "Sermayenin dinamikleri ile kamusal refahın sınırları. Kriz anlarında devletin müdahale araçları, gelir dağılımı adaletsizliği ve sürdürülebilir büyümenin ekonomi-politiği masaya yatırılıyor." },
                { id: "02", title: "Çevre Politikaları", icon: "fa-solid fa-leaf", desc: "Doğa bir kaynak mıdır, yoksa korunması gereken bir özne mi? Antroposen çağında ekolojik yıkıma karşı devletin regülasyon kapasitesi ve yeşil politikaların anayasal inşası tartışılıyor." },
                { id: "03", title: "Sağlık Politikaları", icon: "fa-solid fa-heart-pulse", desc: "Biyopolitika ekseninde yaşam hakkı. Toplum sağlığının güvence altına alınmasında devletin rasyonalitesi, evrensel erişim ve kriz anlarında etik önceliklerin belirlenmesi." },
                { id: "04", title: "Eğitim Politikaları", icon: "fa-solid fa-lightbulb", desc: "İdeal yurttaşın inşasından, eleştirel aklın özgürleşmesine. Fırsat eşitliğinin sağlanması, eğitimde ideolojik aygıtların rolü ve geleceğin müfredat politikaları mercek altında." },
                { id: "05", title: "Siyasal Hukuk", icon: "fa-solid fa-gavel", desc: "Normun ve istisnanın çatışması. Hukuk devletinin sınırları, anayasal güvencelerin esnekliği ve yürütme gücünün sınırlandırılmasında yargısal mekanizmaların işlevselliği." },
                { id: "06", title: "İnsan Hakları", icon: "fa-solid fa-shield-halved", desc: "Leviathan'a karşı bireyin kalkanı. Güvenlik ve özgürlük ikileminde temel hakların korunması, devletin müdahale alanının daraltılması ve evrensel normların yerel dinamiklerle sınavı." },
                { id: "07", title: "Siyasette Sosyoloji", icon: "fa-solid fa-users", desc: "Toplumun fay hatları. Kolektif belleğin inşası, kamusal alanın kimlikler arası müzakereye açılması ve devletin farklılıkları yönetme pratiklerinin eleştirel analizi." },
                { id: "08", title: "Uluslararası İlişkiler", icon: "fa-solid fa-globe", desc: "Küresel anarşi ve gücün mimarisi. Ulus-devlet egemenliğinin aşınması, yeni hegemonya mücadeleleri ve çok kutuplu dünyada diplomasi ve ittifakların yeniden tanımlanması." },
                { id: "09", title: "Gündem", icon: "fa-solid fa-triangle-exclamation", desc: "Öngörülemeyeni yönetmek. Ani gelişen küresel ve yerel kriz senaryoları karşısında devlet refleksleri, risk yönetimi ve acil durum politikalarının simülasyon tabanlı stratejik analizi." },
            ];

            // Kadro verileri
            const teamMembers = [
                { id: 1, name: "Işıl Işıklı", role: "Kurucu Konferans Başkanı", img: "https://spektrum-siyasal-bilimler.vercel.app/assets/isil-S9zZFaal.jpg", instagram: "spektrumorg" },
                { id: 2, name: "Kaan Yalçın", role: "Organizasyon Başkanı", img: "https://spektrum-siyasal-bilimler.vercel.app/assets/kaan-C0YLuY5Z.JPG", instagram: "spektrumorg" },
                { id: 3, name: "Nisa Nur Zor", role: "Organizasyon Eş Başkanı", img: "https://spektrum-siyasal-bilimler.vercel.app/assets/nisa-s_pBt2t5.jpg", instagram: "spektrumorg" },
                { id: 4, name: "Yaren Yılmaz", role: "Genel Sekreter", img: "https://spektrum-siyasal-bilimler.vercel.app/assets/yaren-DsLrIL5J.jpg", instagram: "spektrumorg" },
                { id: 5, name: "Ahmet Tarık Kabasakal", role: "Akademik Direktör", img: "https://spektrum-siyasal-bilimler.vercel.app/assets/ahmet-BQxzsr1Y.jpg", instagram: "spektrumorg" },
                { id: 6, name: "Zeynep Uyanık", role: "Akademik Direktör", img: "https://spektrum-siyasal-bilimler.vercel.app/assets/zeynep-nFL2kSKe.jpg", instagram: "spektrumorg" },
                { id: 7, name: "Doruk Tibet Çetin", role: "Akademik Direktör", img: "https://spektrum-siyasal-bilimler.vercel.app/assets/doruk-vBg1w4z7.jpg", instagram: "spektrumorg" },
            ];

            return (
                <div className="min-h-screen bg-[#fafafa] dark:bg-[#0f172a] font-sans text-[#162a45] dark:text-[#f8fafc] selection:bg-[#162a45] dark:selection:bg-[#8c9eb1] selection:text-white pb-20 bg-grid-pattern relative transition-colors duration-500">
                    
                    {/* GİRİŞ TANITIM VİDEOSU (MODAL) */}
                    {showIntroVideo && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-[#162a45]/60 dark:bg-[#0f172a]/80 backdrop-blur-sm p-4 transition-all duration-500">
                            <div className="bg-white dark:bg-[#1e293b] border-2 border-[#162a45] dark:border-[#8c9eb1] p-6 pt-12 relative shadow-[8px_8px_0px_#162a45] dark:shadow-[8px_8px_0px_#8c9eb1] max-w-[450px] w-full flex flex-col items-center animate-modal-pop">
                                
                                {/* Kapatma Butonu */}
                                <button
                                    onClick={() => setShowIntroVideo(false)}
                                    className="absolute top-3 right-3 text-[#162a45] dark:text-[#8c9eb1] hover:rotate-90 transition-transform duration-300 w-8 h-8 flex items-center justify-center border-2 border-transparent hover:border-[#162a45] dark:hover:border-[#8c9eb1] bg-[#f8fafc] dark:bg-[#0f172a]"
                                >
                                    <i className="fa-solid fa-xmark text-xl"></i>
                                </button>
                                
                                {/* Koyu Mavi Başlık */}
                                <h2 className="text-[#162a45] dark:text-[#8c9eb1] text-2xl font-serif font-bold mb-6 text-center w-full border-b-2 border-dashed border-[#162a45] dark:border-[#8c9eb1] pb-4 tracking-wide">
                                    Tanıtım Videomuz
                                </h2>

                                {/* Instagram iFrame Alanı */}
                                <div className="w-full flex justify-center bg-slate-50 dark:bg-[#0f172a] border-2 border-[#162a45] dark:border-[#8c9eb1] p-1">
                                    <iframe 
                                        src="https://www.instagram.com/reel/DV9Aut7jEQb/embed/" 
                                        className="w-full aspect-[9/16] max-h-[60vh] md:max-h-[500px]"
                                        frameBorder="0" 
                                        scrolling="no" 
                                        allowTransparency="true" 
                                        allowFullScreen="true"
                                    ></iframe>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* KOYU MOD BUTONU (Sağ Alt Köşe Animasyonlu) */}
                    <button
                        onClick={() => setIsDarkMode(!isDarkMode)}
                        className="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-[#162a45] dark:bg-[#1e293b] border-2 border-transparent dark:border-[#8c9eb1] text-white dark:text-[#8c9eb1] shadow-xl flex items-center justify-center transition-all duration-500 z-50 hover:scale-110 overflow-hidden"
                        title={isDarkMode ? "Açık Moda Geç" : "Koyu Moda Geç"}
                    >
                        <div className={`relative flex items-center justify-center w-full h-full transition-transform duration-700 ${isDarkMode ? 'rotate-[360deg]' : 'rotate-0'}`}>
                            {/* Güneş (Koyu moddayken görünür) */}
                            <i className={`fa-solid fa-sun absolute transition-all duration-500 text-2xl ${isDarkMode ? 'opacity-100 scale-100' : 'opacity-0 scale-50 -rotate-90'}`}></i>
                            {/* Yarım Ay (Açık moddayken görünür) */}
                            <i className={`fa-solid fa-moon absolute transition-all duration-500 text-2xl ${!isDarkMode ? 'opacity-100 scale-100' : 'opacity-0 scale-50 rotate-90'}`}></i>
                        </div>
                    </button>

                    {/* NAVBAR */}
                    <nav className="sticky top-0 z-40 bg-[#fafafa]/95 dark:bg-[#0f172a]/95 backdrop-blur-sm border-b-2 border-[#162a45] dark:border-[#8c9eb1] transition-colors duration-500">
                        <div className="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
                            
                            {/* Logo */}
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => { setShowTeam(false); setIsMobileMenuOpen(false); }}>
                                <img 
                                    src="https://res-console.cloudinary.com/dynsqmcjo/thumbnails/transform/v1/image/upload/Y19maWxsLGhfMjAwLHdfMjAw/v1/c3Bla3RydW1fejRpeW1w/template_primary" 
                                    alt="Spektrum Navbar Logo" 
                                    className="w-10 h-10 md:w-12 md:h-12 object-contain"
                                />
                                <div>
                                    <h2 className="text-lg md:text-xl font-serif font-bold tracking-widest leading-none">SPEKTRUM</h2>
