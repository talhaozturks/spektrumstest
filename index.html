<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spektrum Siyasal Bilimler Sempozyumu</title>
    
    <!-- Tailwind CSS (Tarayıcı içi derleyici) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Koyu Mod Ayarı -->
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <!-- FontAwesome İkonları -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React ve ReactDOM kütüphaneleri -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Tarayıcıda JSX'i çevirmek için) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* CSS Değişkenleri ve Özel Animasyonlar */
        :root {
            --grid-color: #e5e7eb;
        }
        .dark {
            --grid-color: #1e293b;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-modal-pop {
            animation: modalPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes floatSlow {
            0%, 100% { transform: translateY(0) rotate(2deg); }
            50% { transform: translateY(-10px) rotate(-1deg); }
        }
        .animate-float-slow {
            animation: floatSlow 4s ease-in-out infinite;
        }

        /* Tema Değişimine Duyarlı Grid Arkaplan */
        .bg-grid-pattern {
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: -1px -1px;
            transition: background-image 0.5s ease-in-out;
        }
    </style>
</head>
<body class="transition-colors duration-500 bg-[#fafafa] dark:bg-[#0f172a]">
    <!-- React uygulamasının yükleneceği ana div -->
    <div id="root"></div>

    <!-- Uygulama Kodları (Babel ile derlenir) -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isLoading, setIsLoading] = useState(true);
            const [progress, setProgress] = useState(0);
            const [textIndex, setTextIndex] = useState(0);
            const [showTeam, setShowTeam] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            // Tanıtım videosu modal (pencere) state'i
            const [showIntroVideo, setShowIntroVideo] = useState(true);
            
            // Gizli Galeri Modal State'i
            const [showSecretGallery, setShowSecretGallery] = useState(false);
            const [galleryIndex, setGalleryIndex] = useState(0);
            
            // Koyu Mod State'i
            const [isDarkMode, setIsDarkMode] = useState(false);

            // Koyu Modu HTML'e uygulama
            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDarkMode]);

            const loadingTexts = [
                "En iyi deneyim için tercihiniz.",
                "Site yükleniyor...",
                ":P"
            ];

            const secretImages = [
                "public/spektrum3.png",
                "public/spektrum2.png",
                "public/isil2.png",
                "public/kaan2.png",
                "public/tibet1.png",
                "public/kaan1.png",
                "public/kabasakal1.png"
            ];

            // Yükleme Animasyonları
            useEffect(() => {
                if (!isLoading) return;
                const progressInterval = setInterval(() => {
                    setProgress((prev) => {
                        if (prev >= 100) {
                            clearInterval(progressInterval);
                            setTimeout(() => setIsLoading(false), 200);
                            return 100;
                        }
                        return Math.min(prev + 1, 100);
                    }, 30);
                }, []);

                const textInterval = setInterval(() => {
                    setTextIndex((prev) => (prev + 1) % loadingTexts.length);
                }, 1200);

                return () => {
                    clearInterval(progressInterval);
                    clearInterval(textInterval);
                };
            }, [isLoading]);

            if (isLoading) {
                return (
                    <div className="fixed inset-0 flex flex-col items-center justify-center pb-24 md:pb-0 bg-[#fafafa] dark:bg-[#0f172a] font-sans selection:bg-[#162a45] selection:text-white transition-colors duration-500 z-[200] overflow-hidden">
                        
                        {/* SAĞDAKİ GÖRSEL VE KONUŞMA BALONCUĞU */}
                        <div className="absolute bottom-0 right-0 md:right-10 flex flex-col items-end animate-fade-in-up z-10" style={{ animationDelay: '0.1s' }}>
                            <div className="relative bg-white dark:bg-[#1e293b] border-2 border-[#162a45] dark:border-[#8c9eb1] p-2 md:p-4 rounded-xl md:rounded-2xl shadow-[4px_4px_0px_#162a45] dark:shadow-[4px_4px_0px_#8c9eb1] mb-1 md:mb-2 mr-4 md:mr-10 transform -rotate-2 hover:rotate-0 transition-transform max-w-[140px] md:max-w-none text-center md:text-left">
                                <p className="text-[#162a45] dark:text-[#f8fafc] font-bold text-xs md:text-base whitespace-normal md:whitespace-nowrap leading-tight">"En İyi politika!"</p>
                                <p className="text-[10px] md:text-sm text-[#8c9eb1] font-mono text-right mt-1">- Işıl IŞIKLI</p>
                                <div className="absolute -bottom-[6px] md:-bottom-[9px] right-6 md:right-8 w-3 h-3 md:w-4 md:h-4 bg-white dark:bg-[#1e293b] border-b-2 border-r-2 border-[#162a45] dark:border-[#8c9eb1] transform rotate-45"></div>
                            </div>
                            
                            <img 
                                src="public/aaisil-S9zZFaal.png" 
                                alt="Işıl Işıklı"
                                className="w-28 h-28 sm:w-40 sm:h-40 md:w-64 md:h-64 object-contain object-bottom drop-shadow-xl"
                            />
                        </div>

                        <div className="mb-6 md:mb-10 flex flex-col items-center transform transition-transform duration-1000 hover:scale-105 relative z-20">
                            <img 
                                src="public/spektrumyazisiz.png" 
                                alt="Spektrum Logo" 
                                className="w-32 h-32 md:w-56 md:h-56 object-contain drop-shadow-sm" 
                            />
                            <h1 className="text-2xl md:text-5xl font-serif tracking-widest text-[#162a45] dark:text-[#f8fafc] mt-4 transition-colors duration-500" style={{ fontFamily: 'Georgia, serif' }}>
                                SPEKTRUM
                            </h1>
                        </div>
                        <div className="w-56 md:w-80 h-3 border-2 border-[#162a45] dark:border-[#8c9eb1] bg-white dark:bg-[#1e293b] p-0.5 relative overflow-hidden transition-colors duration-500 z-20">
                            <div className="h-full bg-[#162a45] dark:bg-[#8c9eb1] transition-all duration-100 ease-out" style={{ width: `${progress}%` }}></div>
                        </div>
                        <div className="h-8 mt-4 overflow-hidden flex items-center justify-center z-20">
                            <p key={textIndex} className="text-[#162a45] dark:text-[#f8fafc] text-xs md:text-base font-medium animate-fade-in-up transition-colors duration-500">
                                {loadingTexts[textIndex]}
                            </p>
                        </div>
                    </div>
                );
            }

            // Komisyon Verileri
            const committees = [
                { id: "01", title: "Siyasal Ekonomi", icon: "fa-solid fa-scale-balanced", desc: "Sermayenin dinamikleri ile kamusal refahın sınırları. Kriz anlarında devletin müdahale araçları, gelir dağılımı adaletsizliği ve sürdürülebilir büyümenin ekonomi-politiği masaya yatırılıyor." },
                { id: "02", title: "Çevre Politikaları", icon: "fa-solid fa-leaf", desc: "Doğa bir kaynak mıdır, yoksa korunması gereken bir özne mi? Antroposen çağında ekolojik yıkıma karşı devletin regülasyon kapasitesi ve yeşil politikaların anayasal inşası tartışılıyor." },
                { id: "03", title: "Sağlık Politikaları", icon: "fa-solid fa-heart-pulse", desc: "Biyopolitika ekseninde yaşam hakkı. Toplum sağlığının güvence altına alınmasında devletin rasyonalitesi, evrensel erişim ve kriz anlarında etik önceliklerin belirlenmesi." },
                { id: "04", title: "Eğitim Politikaları", icon: "fa-solid fa-lightbulb", desc: "İdeal yurttaşın inşasından, eleştirel aklın özgürleşmesine. Fırsat eşitliğinin sağlanması, eğitimde ideolojik aygıtların rolü ve geleceğin müfredat politikaları mercek altında." },
                { id: "05", title: "Siyasal Hukuk", icon: "fa-solid fa-gavel", desc: "Normun ve istisnanın çatışması. Hukuk devletinin sınırları, anayasal güvencelerin esnekliği ve yürütme gücünün sınırlandırılmasında yargısal mekanizmaların işlevselliği." },
                { id: "06", title: "İnsan Hakları", icon: "fa-solid fa-shield-halved", desc: "Leviathan'a karşı bireyin kalkanı. Güvenlik ve özgürlük ikileminde temel hakların korunması, devletin müdahale alanının daraltılması ve evrensel normların yerel dinamiklerle sınavı." },
                { id: "07", title: "Siyasette Sosyoloji", icon: "fa-solid fa-users", desc: "Toplumun fay hatları. Kolektif belleğin inşası, kamusal alanın kimlikler arası müzakereye açılması ve devletin farklılıkları yönetme pratiklerinin eleştirel analizi." },
                { id: "08", title: "Uluslararası İlişkiler", icon: "fa-solid fa-globe", desc: "Küresel anarşi ve gücün mimarisi. Ulus-devlet egemenliğinin aşınması, yeni hegemonya mücadeleleri ve çok kutuplu dünyada diplomasi ve ittifakların yeniden tanımlanması." },
                { id: "09", title: "Gündem", icon: "fa-solid fa-triangle-exclamation", desc: "Öngörülemeyeni yönetmek. Ani gelişen küresel ve yerel kriz senaryoları karşısında devlet refleksleri, risk yönetimi ve acil durum politikalarının simülasyon tabanlı stratejik analizi." },
            ];

            // Kadro verileri
            const teamMembers = [
                { id: 1, name: "Işıl Işıklı", role: "Kurucu Konferans Başkanı", img: "https://spektrum-siyasal-bilimler.vercel.app/assets/isil-S9zZFaal.jpg", instagram: "spektrumorg" },
                { id: 2, name: "Kaan Yalçın", role: "Organizasyon Başkanı", img: "https://spektrum-siyasal-bilimler.vercel.app/assets/kaan-C0YLuY5Z.JPG", instagram: "spektrumorg" },
                { id: 3, name: "Nisa Nur Zor", role: "Organizasyon Eş Başkanı", img: "https://spektrum-siyasal-bilimler.vercel.app/assets/nisa-s_pBt2t5.jpg", instagram: "spektrumorg" },
                { id: 4, name: "Yaren Yılmaz", role: "Genel Sekreter", img: "https://spektrum-siyasal-bilimler.vercel.app/assets/yaren-DsLrIL5J.jpg", instagram: "spektrumorg" },
                { id: 5, name: "Ahmet Tarık Kabasakal", role: "Akademik Direktör", img: "https://spektrum-siyasal-bilimler.vercel.app/assets/ahmet-BQxzsr1Y.jpg", instagram: "spektrumorg" },
                { id: 6, name: "Zeynep Uyanık", role: "Akademik Direktör", img: "https://spektrum-siyasal-bilimler.vercel.app/assets/zeynep-nFL2kSKe.jpg", instagram: "spektrumorg" },
                { id: 7, name: "Doruk Tibet Çetin", role: "Akademik Direktör", img: "https://spektrum-siyasal-bilimler.vercel.app/assets/doruk-vBg1w4z7.jpg", instagram: "spektrumorg" },
            ];

            return (
                <div className="min-h-screen bg-[#fafafa] dark:bg-[#0f172a] font-sans text-[#162a45] dark:text-[#f8fafc] selection:bg-[#162a45] dark:selection:bg-[#8c9eb1] selection:text-white pb-20 bg-grid-pattern relative transition-colors duration-500">
                    
                    {/* GİRİŞ TANITIM VİDEOSU (MODAL) */}
                    {showIntroVideo && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-[#162a45]/60 dark:bg-[#0f172a]/80 backdrop-blur-sm p-4 transition-all duration-500">
                            <div className="bg-white dark:bg-[#1e293b] border-2 border-[#162a45] dark:border-[#8c9eb1] p-6 pt-12 relative shadow-[8px_8px_0px_#162a45] dark:shadow-[8px_8px_0px_#8c9eb1] max-w-[450px] w-full flex flex-col items-center animate-modal-pop">
                                
                                <button
                                    onClick={() => setShowIntroVideo(false)}
                                    className="absolute top-3 right-3 text-[#162a45] dark:text-[#8c9eb1] hover:rotate-90 transition-transform duration-300 w-8 h-8 flex items-center justify-center border-2 border-transparent hover:border-[#162a45] dark:hover:border-[#8c9eb1] bg-[#f8fafc] dark:bg-[#0f172a]"
                                >
                                    <i className="fa-solid fa-xmark text-xl"></i>
                                </button>
                                
                                <h2 className="text-[#162a45] dark:text-[#8c9eb1] text-2xl font-serif font-bold mb-6 text-center w-full border-b-2 border-dashed border-[#162a45] dark:border-[#8c9eb1] pb-4 tracking-wide">
                                    Tanıtım Videomuz
                                </h2>

                                <div className="w-full flex justify-center bg-slate-50 dark:bg-[#0f172a] border-2 border-[#162a45] dark:border-[#8c9eb1] p-1">
                                    <iframe 
                                        src="https://www.instagram.com/reel/DV9Aut7jEQb/embed/" 
                                        className="w-full aspect-[9/16] max-h-[60vh] md:max-h-[500px]"
                                        frameBorder="0" 
                                        scrolling="no" 
                                        allowTransparency="true" 
                                        allowFullScreen="true"
                                    ></iframe>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* GİZLİ GALERİ (MODAL) */}
                    {showSecretGallery && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center bg-black/90 backdrop-blur-md p-4 transition-all duration-500 animate-fade-in-up">
                            
                            {/* Kapatma Butonu */}
                            <button
                                onClick={() => setShowSecretGallery(false)}
                                className="absolute top-4 right-4 md:top-6 md:right-6 text-white/80 hover:text-red-400 transition-colors duration-300 z-[350] text-3xl md:text-4xl"
                            >
                                <i className="fa-solid fa-xmark"></i>
                            </button>

                            <div className="w-full max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-center gap-8 h-[90vh] md:h-[85vh]">
                                
                                {/* SOL: Galeri Alanı */}
                                <div className="flex-1 w-full relative flex items-center justify-center h-full max-h-[60vh] md:max-h-full bg-black border-2 border-slate-700/50 rounded-xl overflow-hidden shadow-2xl">
                                    <img 
                                        src={secretImages[galleryIndex]} 
                                        alt={`Gizli Galeri ${galleryIndex + 1}`} 
                                        className="max-w-full max-h-full object-contain select-none"
                                    />
                                    
                                    {/* Yön Tuşları */}
                                    <button 
                                        onClick={() => setGalleryIndex(prev => prev === 0 ? secretImages.length - 1 : prev - 1)}
                                        className="absolute left-2 md:left-4 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/80 text-white w-10 h-10 md:w-14 md:h-14 rounded-full flex items-center justify-center backdrop-blur-sm transition-all border border-white/20 shadow-lg"
                                    >
                                        <i className="fa-solid fa-chevron-left text-lg md:text-2xl"></i>
                                    </button>
                                    <button 
                                        onClick={() => setGalleryIndex(prev => prev === secretImages.length - 1 ? 0 : prev + 1)}
                                        className="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/80 text-white w-10 h-10 md:w-14 md:h-14 rounded-full flex items-center justify-center backdrop-blur-sm transition-all border border-white/20 shadow-lg"
                                    >
                                        <i className="fa-solid fa-chevron-right text-lg md:text-2xl"></i>
                                    </button>

                                    {/* Resim Sayacı */}
                                    <div className="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/70 border border-white/20 text-white px-4 py-1.5 rounded-full text-xs md:text-sm font-mono tracking-widest backdrop-blur-md">
                                        {galleryIndex + 1} / {secretImages.length}
                                    </div>
                                </div>

                                {/* SAĞ: Kaan Konuşuyor */}
                                <div className="w-full md:w-1/3 flex flex-col items-center justify-center relative mt-6 md:mt-0">
                                    {/* Konuşma Baloncuğu */}
                                    <div className="relative bg-[#fafafa] border-2 border-[#162a45] text-[#162a45] p-4 md:p-5 rounded-2xl shadow-xl mb-4 md:mb-6 animate-float-slow max-w-[200px] md:max-w-[250px] z-10">
                                        <p className="font-bold text-sm md:text-lg leading-tight text-center">"ekip çok sağlam"</p>
                                        <p className="text-[10px] md:text-xs text-[#8c9eb1] font-mono mt-2 text-right">-Kaan Yalçın</p>
                                        <div className="absolute -bottom-3 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[10px] border-l-transparent border-t-[15px] border-t-[#162a45] border-r-[10px] border-r-transparent"></div>
                                        <div className="absolute -bottom-[9px] left-1/2 -translate-x-1/2 w-0 h-0 border-l-[8px] border-l-transparent border-t-[13px] border-t-[#fafafa] border-r-[8px] border-r-transparent"></div>
                                    </div>
                                    
                                    {/* Kaan Görseli */}
                                    <img 
                                        src="public/kaankonusuyor.png" 
                                        alt="Kaan Konuşuyor" 
                                        className="w-32 h-32 md:w-56 md:h-56 object-contain drop-shadow-2xl"
                                    />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* KOYU MOD BUTONU */}
                    <button
                        onClick={() => setIsDarkMode(!isDarkMode)}
                        className="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-[#162a45] dark:bg-[#1e293b] border-2 border-transparent dark:border-[#8c9eb1] text-white dark:text-[#8c9eb1] shadow-xl flex items-center justify-center transition-all duration-500 z-50 hover:scale-110 overflow-hidden"
                        title={isDarkMode ? "Açık Moda Geç" : "Koyu Moda Geç"}
                    >
                        <div className={`relative flex items-center justify-center w-full h-full transition-transform duration-700 ${isDarkMode ? 'rotate-[360deg]' : 'rotate-0'}`}>
                            <i className={`fa-solid fa-sun absolute transition-all duration-500 text-2xl ${isDarkMode ? 'opacity-100 scale-100' : 'opacity-0 scale-50 -rotate-90'}`}></i>
                            <i className={`fa-solid fa-moon absolute transition-all duration-500 text-2xl ${!isDarkMode ? 'opacity-100 scale-100' : 'opacity-0 scale-50 rotate-90'}`}></i>
                        </div>
                    </button>

                    {/* NAVBAR */}
                    <nav className="sticky top-0 z-40 bg-[#fafafa]/95 dark:bg-[#0f172a]/95 backdrop-blur-sm border-b-2 border-[#162a45] dark:border-[#8c9eb1] transition-colors duration-500">
                        <div className="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => { setShowTeam(false); setIsMobileMenuOpen(false); }}>
                                <img 
                                    src="public/spektrum.png" 
                                    alt="Spektrum Navbar Logo" 
                                    className="w-10 h-10 md:w-12 md:h-12 object-contain"
                                />
                                <div>
                                    <h2 className="text-lg md:text-xl font-serif font-bold tracking-widest leading-none">SPEKTRUM</h2>
                                    <span className="text-[0.55rem] md:text-[0.6rem] tracking-widest text-[#8c9eb1] uppercase">Sempozyumu</span>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex items-center gap-8 font-medium text-sm tracking-wide">
                                <button onClick={() => setShowTeam(false)} className={`transition-colors ${!showTeam ? 'font-bold text-[#162a45] dark:text-white' : 'hover:text-[#8c9eb1] text-[#162a45] dark:text-[#8c9eb1]'}`}>ANA SAYFA</button>
                                <a href="#hakkimizda" className="transition-colors hover:text-[#8c9eb1] text-[#162a45] dark:text-[#8c9eb1] dark:hover:text-white" onClick={() => setShowTeam(false)}>HAKKIMIZDA</a>
                                <a href="#program" className="transition-colors hover:text-[#8c9eb1] text-[#162a45] dark:text-[#8c9eb1] dark:hover:text-white" onClick={() => setShowTeam(false)}>PROGRAM</a>
                                <button onClick={() => setShowTeam(true)} className={`transition-colors ${showTeam ? 'border-b-2 border-[#162a45] dark:border-white pb-1 font-bold text-[#162a45] dark:text-white' : 'hover:text-[#8c9eb1] text-[#162a45] dark:text-[#8c9eb1]'}`}>KADROMUZ</button>
                                <button className="border-2 border-[#162a45] dark:border-[#8c9eb1] px-6 py-2 hover:bg-[#162a45] dark:hover:bg-[#8c9eb1] hover:text-white dark:hover:text-[#0f172a] transition-colors duration-300 font-bold">
                                    KAYIT OL
                                </button>
                            </div>

                            <div className="md:hidden flex items-center">
                                <button 
                                    onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} 
                                    className="text-[#162a45] dark:text-[#f8fafc] p-2 focus:outline-none"
                                >
                                    <i className={`fa-solid ${isMobileMenuOpen ? 'fa-xmark' : 'fa-bars'} text-2xl`}></i>
                                </button>
                            </div>
                        </div>

                        {isMobileMenuOpen && (
                            <div className="md:hidden absolute top-20 left-0 w-full bg-[#fafafa] dark:bg-[#0f172a] border-b-2 border-[#162a45] dark:border-[#8c9eb1] shadow-xl animate-fade-in-up" style={{ animationDuration: '0.2s' }}>
                                <div className="flex flex-col px-6 py-6 gap-6 font-bold tracking-widest text-sm">
                                    <button onClick={() => { setShowTeam(false); setIsMobileMenuOpen(false); }} className={`text-left w-full border-b border-slate-200 dark:border-slate-700 pb-2 ${!showTeam ? 'text-[#162a45] dark:text-white' : 'text-[#8c9eb1] dark:text-[#8c9eb1]'}`}>ANA SAYFA</button>
                                    <a href="#hakkimizda" onClick={() => { setShowTeam(false); setIsMobileMenuOpen(false); }} className="text-left w-full border-b border-slate-200 dark:border-slate-700 pb-2 text-[#8c9eb1] hover:text-[#162a45] dark:hover:text-white">HAKKIMIZDA</a>
